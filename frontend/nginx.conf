server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* und /healthz zum Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # SPA-Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}