name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_PREFIX: ghcr.io/skords83/termina

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        run: |
          docker build \
            --no-cache \
            --build-arg VITE_API_BASE_URL=/api \
            -t ${{ env.IMAGE_PREFIX }}/frontend:latest \
            ./frontend
          docker push ${{ env.IMAGE_PREFIX }}/frontend:latest

      - name: Build and push backend
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/backend:latest \
            ./backend
          docker push ${{ env.IMAGE_PREFIX }}/backend:latest

      - name: Redeploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/lib/docker/volumes/docker_dockhand_data/_data/stacks/VPS/termina
            docker compose pull
            docker compose up -d
